<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crystal Clear Communications - Nurse Command Center</title>
    <meta name="description" content="Crystal Clear Communications - Nurse Command Center" />
    
    <!-- Fonts: Inter for UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Material Symbols for Dispatch Page & Dashboard -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ["Inter", "sans-serif"],
            },
            colors: {
              // Updated Main App Colors
              primary: {
                DEFAULT: '#0066cc', // New primary from design
                50: '#eff6ff',
                100: '#dbeafe',
                500: '#3b82f6',
                600: '#2563eb', 
                700: '#1d4ed8',
                900: '#1e3a8a',
              },
              "background-light": "#f5f7f8",
              "background-dark": "#0f1923",
              "alert-red": "#dc2626",
              "alert-orange": "#ea580c",
              slate: {
                850: '#151f2e',
                900: '#0f172a',
              },
              // Dispatch Console Specific Colors
              dispatch: {
                primary: "#0f66bd",
                bg: {
                  light: "#f6f7f8",
                  dark: "#111418",
                },
                surface: "#1d242d",
                border: "#283039",
              },
              // Utility Aliases for Dispatch
              danger: "#ef4444",
              warning: "#f97316",
              success: "#0bda5b",
            }
          }
        }
      }
    </script>
    <style>
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      .shadow-floating {
          box-shadow: 0 10px 40px -10px rgba(0,0,0,0.15);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",

    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?deps=react@18.3.1",
    "lucide-react": "https://esm.sh/lucide-react@0.469.0?deps=react@18.3.1",
    "react-router-dom": "https://esm.sh/react-router-dom@6.28.0?deps=react@18.3.1,react-dom@18.3.1",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
